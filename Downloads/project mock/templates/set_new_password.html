{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxelle | Set New Password</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="{% static 'css/styles.css' %}" rel="stylesheet">
</head>
<body>
    <div class="login-wrapper fade-in-section">
        <div class="container-fluid p-0">
            <div class="row g-0 vh-100 align-items-center justify-content-center">
                <!-- Left Banner Section -->
                <div class="col-12 col-lg-6 d-none d-lg-block banner-section h-100 position-relative overflow-hidden">
                    <div class="banner-overlay"></div>
                    <img src="{% static 'image/Unleash Your Elegance_ Luxury Women\'s Bags.jpg' %}" alt="Luxelle Handbag" class="banner-image floating-anim">
                    <div class="banner-text position-absolute bottom-0 start-0 p-5 w-100 text-white z-2">
                        <h2 class="display-5 font-playfair mb-3">Re-establish Security</h2>
                        <p class="lead font-inter fw-light opacity-75">Update your keys to continue shopping premium signature leatherware.</p>
                    </div>
                </div>

                <!-- Right Form Section -->
                <div class="col-12 col-lg-6 form-section d-flex justify-content-center align-items-center h-100">
                    <div class="login-card w-100 p-4 p-md-5 mx-auto">
                        <div class="text-center mb-4">
                            <!-- Circular Gold Key Lock Icon -->
                            <span class="d-inline-flex align-items-center justify-content-center bg-lux-gold-light text-lux-gold rounded-circle mb-3 mx-auto" style="width: 58px; height: 58px;">
                                <i class="fa-solid fa-key fs-4"></i>
                            </span>
                            <h1 class="brand-logo font-playfair mb-2">Set New Password</h1>
                            <p class="text-muted font-inter text-xs">Establish a new, strong security password to protect your exclusive account access privileges.</p>
                        </div>

                        <!-- Reset Password Form -->
                        <form id="resetPasswordForm" class="font-inter" action="{% url 'set_new_password' %}" method="POST">
    {% csrf_token %}
                            <!-- New Password Input -->
                            <div class="form-floating mb-3 custom-input-group position-relative">
                                <input type="password" class="form-control custom-input" id="newPasswordInput" placeholder="Password" required>
                                <label for="newPasswordInput">New Password</label>
                                <span class="position-absolute end-3 top-50 translate-middle-y text-lux-gray cursor-pointer z-3" onclick="togglePasswordVisibility(this)">
                                    <i class="fa-regular fa-eye text-xs"></i>
                                </span>
                            </div>

                            <!-- Confirm Password Input -->
                            <div class="form-floating mb-4 custom-input-group position-relative">
                                <input type="password" class="form-control custom-input" id="confirmPasswordInput" placeholder="Confirm Password" required>
                                <label for="confirmPasswordInput">Confirm New Password</label>
                                <span class="position-absolute end-3 top-50 translate-middle-y text-lux-gray cursor-pointer z-3" onclick="togglePasswordVisibility(this)">
                                    <i class="fa-regular fa-eye text-xs"></i>
                                </span>
                            </div>

                            <!-- Buttons -->
                            <button type="submit" class="btn btn-primary w-100 py-3 mb-4 luxury-btn" onclick="alert('Password reset completed successfully! You can now sign in using your new credentials.')">Reset Password & Sign In</button>
                            
                            <p class="text-center text-muted mb-0">
                                <a href="{% url 'login' %}" class="register-link text-decoration-none fw-medium"><i class="fa-solid fa-arrow-left me-1"></i> Back to Sign In</a>
                            </p>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom Script Interactions -->
    <script>
        // Password visibility toggler
        function togglePasswordVisibility(btn) {
            const input = btn.previousElementSibling.previousElementSibling; // floating label offsets structure
            const icon = btn.querySelector('i');
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove('fa-regular', 'fa-eye');
                icon.classList.add('fa-solid', 'fa-eye-slash');
            } else {
                input.type = "password";
                icon.classList.remove('fa-solid', 'fa-eye-slash');
                icon.classList.add('fa-regular', 'fa-eye');
            }
        }
    </script>
</body>
</html>
