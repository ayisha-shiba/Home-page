{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxelle Admin — Confirm Logout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0b0b;
            --card: #151515;
            --card2: #1a1a1a;
            --gold: #c5a059;
            --gold-b: #e5c17d;
            --white: #fff;
            --gray: #888;
            --border: rgba(255, 255, 255, .06);
            --red: #e74c3c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Abstract luxury backgrounds */
        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(197, 160, 89, 0.04) 0%, transparent 70%);
            top: -150px;
            left: -150px;
            z-index: 1;
        }
        body::after {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(197, 160, 89, 0.04) 0%, transparent 70%);
            bottom: -150px;
            right: -150px;
            z-index: 1;
        }

        .logout-container {
            position: relative;
            z-index: 10;
            width: 480px;
            max-width: 90vw;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3.5rem 3rem;
            text-align: center;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.7);
        }

        .brand-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.85rem;
            letter-spacing: .25em;
            color: var(--gold);
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .brand-sub {
            font-size: .65rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            color: var(--gray);
            margin-bottom: 2.5rem;
            display: block;
        }

        .logout-icon {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            background: rgba(197, 160, 89, 0.06);
            border: 1px solid rgba(197, 160, 89, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 1.85rem;
            margin: 0 auto 2rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .logout-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--white);
        }
        .logout-desc {
            font-size: .85rem;
            color: var(--gray);
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .actions-row {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        .logout-btn {
            flex: 1;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            font-size: .75rem;
            font-weight: 700;
            letter-spacing: .12em;
            text-transform: uppercase;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all .25s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-cancel {
            background: var(--card2);
            color: var(--white);
            border-color: var(--border);
        }
        .btn-cancel:hover {
            border-color: var(--gold);
            color: var(--gold);
        }
        .btn-confirm {
            background: var(--gold);
            color: #0b0b0b;
        }
        .btn-confirm:hover {
            background: var(--gold-b);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="logout-container">
        <h1 class="brand-logo">LUXELLE</h1>
        <span class="brand-sub">Admin Control Panel</span>

        <div class="logout-icon">
            <i class="fa-solid fa-right-from-bracket"></i>
        </div>

        <h2 class="logout-title">Confirm Logout</h2>
        <p class="logout-desc">Are you sure you want to end your administrative session and sign out of the Luxelle control panel?</p>

        <div class="actions-row">
            <!-- Go back to referring dashboard or dashboard by default -->
            <a href="{% url 'admin_dashboard' %}" class="logout-btn btn-cancel">Cancel</a>
            <a href="{% url 'admin_login' %}" class="logout-btn btn-confirm">Sign Out</a>
        </div>
    </div>
</body>
</html>
